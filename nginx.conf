# LifeMed CRM — Nginx Configuration
# Copy this to /etc/nginx/sites-available/lifemed
# Then: ln -s /etc/nginx/sites-available/lifemed /etc/nginx/sites-enabled/
# And:  nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Redirect HTTP to HTTPS (uncomment after SSL setup)
    # return 301 https://$host$request_uri;

    root /var/www/lifemed;
    index index.php index.html;

    # Max upload size
    client_max_body_size 12M;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block sensitive directories
    location ~ ^/(config|database|includes)/ {
        deny all;
        return 404;
    }

    # Block sensitive files
    location ~ /\.env|\.git|\.sql$ {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
    }

    # Block error.log
    location = /error.log {
        deny all;
    }

    # Static assets — long cache
    location ~* \.(css|js|woff2?|ttf|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PHP handling
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        # Or use TCP: fastcgi_pass 127.0.0.1:9000;

        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Security
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 30;
    }

    # Clean URLs (optional)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Custom 404
    error_page 404 /404.php;
    location = /404.php {
        internal;
    }

    # Deny access to hidden files
    location ~ /\.(?!well-known) {
        deny all;
    }
}

